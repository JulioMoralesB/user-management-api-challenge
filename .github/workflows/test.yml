name: E2E Tests (Dev & Prod)

on:
  push:
    branches: [ main, develop ]
  pull_request:
    branches: [ main, develop ]

permissions:
  contents: read
  checks: write
  pages: write
  id-token: write

jobs:
  test-dev:
    runs-on: ubuntu-latest
    steps:
      - uses: actions/checkout@v4
      
      - name: Start API Container
        run: |
          docker run -d -p 3000:3000 ghcr.io/danielsilva-loanpro/sdet-interview-challenge:latest
          # Wait for API to be ready
          for i in {1..30}; do
            if curl -f http://localhost:3000/dev/users > /dev/null 2>&1; then
              echo "API is ready"
              exit 0
            fi
            echo "Waiting for API... ($i/30)"
            sleep 1
          done
          echo "API failed to start"
          exit 1
      
      - name: Set up Python
        uses: actions/setup-python@v4
        with:
          python-version: '3.11'
      
      - name: Install dependencies
        run: |
          python -m pip install --upgrade pip
          pip install -r requirements.txt
      
      - name: Run tests for dev environment
        run: |
          pytest tests/ -v --tb=short -k "dev" --junitxml=test-results-dev.xml --html=report-dev.html --self-contained-html
        env:
          API_BASE_URL: http://localhost:3000
      
      - name: Generate dev test summary
        if: always()
        run: |
          echo "## Dev Environment Test Results" >> $GITHUB_STEP_SUMMARY
          echo "" >> $GITHUB_STEP_SUMMARY
          if [ -f test-results-dev.xml ]; then
            TESTS=$(grep -o 'tests="[0-9]*"' test-results-dev.xml | head -1 | grep -o '[0-9]*')
            FAILURES=$(grep -o 'failures="[0-9]*"' test-results-dev.xml | head -1 | grep -o '[0-9]*')
            ERRORS=$(grep -o 'errors="[0-9]*"' test-results-dev.xml | head -1 | grep -o '[0-9]*')
            echo "| Metric | Count |" >> $GITHUB_STEP_SUMMARY
            echo "|--------|-------|" >> $GITHUB_STEP_SUMMARY
            echo "| Total Tests | $TESTS |" >> $GITHUB_STEP_SUMMARY
            echo "| Failures | $FAILURES |" >> $GITHUB_STEP_SUMMARY
            echo "| Errors | $ERRORS |" >> $GITHUB_STEP_SUMMARY
            echo "" >> $GITHUB_STEP_SUMMARY
            if [ "$FAILURES" != "0" ] || [ "$ERRORS" != "0" ]; then
              echo "### Failed Tests" >> $GITHUB_STEP_SUMMARY
              echo '```' >> $GITHUB_STEP_SUMMARY
              grep -B1 '<failure' test-results-dev.xml | grep 'testcase' | sed 's/.*name="\([^"]*\)".*/\1/' >> $GITHUB_STEP_SUMMARY || true
              echo '```' >> $GITHUB_STEP_SUMMARY
            fi
          else
            echo "No test results found." >> $GITHUB_STEP_SUMMARY
          fi
      
      - name: Upload test results (dev)
        if: always()
        uses: actions/upload-artifact@v4
        with:
          name: test-results-dev
          path: |
            test-results-dev.xml
            report-dev.html

      - name: Publish dev test report
        if: always()
        uses: dorny/test-reporter@v1
        with:
          name: Dev Test Report
          path: test-results-dev.xml
          reporter: java-junit

  test-prod:
    runs-on: ubuntu-latest
    steps:
      - uses: actions/checkout@v4
      
      - name: Start API Container
        run: |
          docker run -d -p 3000:3000 ghcr.io/danielsilva-loanpro/sdet-interview-challenge:latest
          # Wait for API to be ready
          for i in {1..30}; do
            if curl -f http://localhost:3000/prod/users > /dev/null 2>&1; then
              echo "API is ready"
              exit 0
            fi
            echo "Waiting for API... ($i/30)"
            sleep 1
          done
          echo "API failed to start"
          exit 1
      
      - name: Set up Python
        uses: actions/setup-python@v4
        with:
          python-version: '3.11'
      
      - name: Install dependencies
        run: |
          python -m pip install --upgrade pip
          pip install -r requirements.txt
      
      - name: Run tests for prod environment
        run: |
          pytest tests/ -v --tb=short -k "prod" --junitxml=test-results-prod.xml --html=report-prod.html --self-contained-html
        env:
          API_BASE_URL: http://localhost:3000
      
      - name: Generate prod test summary
        if: always()
        run: |
          echo "## Prod Environment Test Results" >> $GITHUB_STEP_SUMMARY
          echo "" >> $GITHUB_STEP_SUMMARY
          if [ -f test-results-prod.xml ]; then
            TESTS=$(grep -o 'tests="[0-9]*"' test-results-prod.xml | head -1 | grep -o '[0-9]*')
            FAILURES=$(grep -o 'failures="[0-9]*"' test-results-prod.xml | head -1 | grep -o '[0-9]*')
            ERRORS=$(grep -o 'errors="[0-9]*"' test-results-prod.xml | head -1 | grep -o '[0-9]*')
            echo "| Metric | Count |" >> $GITHUB_STEP_SUMMARY
            echo "|--------|-------|" >> $GITHUB_STEP_SUMMARY
            echo "| Total Tests | $TESTS |" >> $GITHUB_STEP_SUMMARY
            echo "| Failures | $FAILURES |" >> $GITHUB_STEP_SUMMARY
            echo "| Errors | $ERRORS |" >> $GITHUB_STEP_SUMMARY
            echo "" >> $GITHUB_STEP_SUMMARY
            if [ "$FAILURES" != "0" ] || [ "$ERRORS" != "0" ]; then
              echo "### Failed Tests" >> $GITHUB_STEP_SUMMARY
              echo '```' >> $GITHUB_STEP_SUMMARY
              grep -B1 '<failure' test-results-prod.xml | grep 'testcase' | sed 's/.*name="\([^"]*\)".*/\1/' >> $GITHUB_STEP_SUMMARY || true
              echo '```' >> $GITHUB_STEP_SUMMARY
            fi
          else
            echo "No test results found." >> $GITHUB_STEP_SUMMARY
          fi
      
      - name: Upload test results (prod)
        if: always()
        uses: actions/upload-artifact@v4
        with:
          name: test-results-prod
          path: |
            test-results-prod.xml
            report-prod.html

      - name: Publish prod test report
        if: always()
        uses: dorny/test-reporter@v1
        with:
          name: Prod Test Report
          path: test-results-prod.xml
          reporter: java-junit

  deploy-reports:
    runs-on: ubuntu-latest
    needs: [test-dev, test-prod]
    if: always()
    environment:
      name: github-pages
      url: ${{ steps.deployment.outputs.page_url }}
    steps:
      - name: Download dev report
        uses: actions/download-artifact@v4
        with:
          name: test-results-dev
          path: reports/

      - name: Download prod report
        uses: actions/download-artifact@v4
        with:
          name: test-results-prod
          path: reports/

      - name: Create index page
        run: |
          cat > reports/index.html << 'EOF'
          <!DOCTYPE html>
          <html>
          <head><title>Test Reports</title></head>
          <body>
            <h1>Test Reports</h1>
            <ul>
              <li><a href="report-dev.html">Dev Environment Report</a></li>
              <li><a href="report-prod.html">Prod Environment Report</a></li>
            </ul>
          </body>
          </html>
          EOF

      - name: Setup Pages
        uses: actions/configure-pages@v4

      - name: Upload to Pages
        uses: actions/upload-pages-artifact@v3
        with:
          path: reports/

      - name: Deploy to GitHub Pages
        id: deployment
        uses: actions/deploy-pages@v4

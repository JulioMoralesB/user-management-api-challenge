name: E2E Tests (Dev & Prod)

on:
  push:
    branches: [ main, develop ]
  pull_request:
    branches: [ main, develop ]

jobs:
  test-dev:
    runs-on: ubuntu-latest
    steps:
      - uses: actions/checkout@v4
      
      - name: Start API Container
        run: |
          docker run -d -p 3000:3000 ghcr.io/danielsilva-loanpro/sdet-interview-challenge:latest
          # Wait for API to be ready
          for i in {1..30}; do
            if curl -f http://localhost:3000/dev/users > /dev/null 2>&1; then
              echo "API is ready"
              exit 0
            fi
            echo "Waiting for API... ($i/30)"
            sleep 1
          done
          echo "API failed to start"
          exit 1
      
      - name: Set up Python
        uses: actions/setup-python@v4
        with:
          python-version: '3.11'
      
      - name: Install dependencies
        run: |
          python -m pip install --upgrade pip
          pip install -r requirements.txt
      
      - name: Run tests for dev environment
        run: |
          pytest tests/ -v --tb=short -m "not slow" -k "dev" --junitxml=test-results-dev.xml --html=report-dev.html --self-contained-html || true
        env:
          API_BASE_URL: http://localhost:3000
      
      - name: Upload test results (dev)
        if: always()
        uses: actions/upload-artifact@v4
        with:
          name: test-results-dev
          path: |
            test-results-dev.xml
            report-dev.html

  test-prod:
    runs-on: ubuntu-latest
    steps:
      - uses: actions/checkout@v4
      
      - name: Start API Container
        run: |
          docker run -d -p 3000:3000 ghcr.io/danielsilva-loanpro/sdet-interview-challenge:latest
          # Wait for API to be ready
          for i in {1..30}; do
            if curl -f http://localhost:3000/prod/users > /dev/null 2>&1; then
              echo "API is ready"
              exit 0
            fi
            echo "Waiting for API... ($i/30)"
            sleep 1
          done
          echo "API failed to start"
          exit 1
      
      - name: Set up Python
        uses: actions/setup-python@v4
        with:
          python-version: '3.11'
      
      - name: Install dependencies
        run: |
          python -m pip install --upgrade pip
          pip install -r requirements.txt
      
      - name: Run tests for prod environment
        run: |
          pytest tests/ -v --tb=short -m "not slow" -k "prod" --junitxml=test-results-prod.xml --html=report-prod.html --self-contained-html || true
        env:
          API_BASE_URL: http://localhost:3000
      
      - name: Upload test results (prod)
        if: always()
        uses: actions/upload-artifact@v4
        with:
          name: test-results-prod
          path: |
            test-results-prod.xml
            report-prod.html

  publish-results:
    runs-on: ubuntu-latest
    needs: [test-dev, test-prod]
    if: always()
    steps:
      - uses: actions/download-artifact@v4
        with:
          path: artifacts
      
      - name: Publish test results summary
        run: |
          echo "## Test Results Summary"
          echo ""
          echo "All test artifacts have been uploaded."
          echo "Check the 'Artifacts' section in the workflow run for detailed results."
